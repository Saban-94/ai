<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SabanOS | שליחת הזמנה</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #10b981;
            --text: #f8fafc;
            --border: #334155;
            --btn-hover: #059669;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        .app-card {
            width: 90%;
            max-width: 450px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        h2 { 
            margin: 0 0 20px 0; 
            font-size: 24px; 
            text-align: center; 
            color: var(--accent);
            letter-spacing: 1px;
        }

        .section-title {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
            display: block;
        }

        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 20px; 
        }

        .customer-btn { 
            padding: 18px 10px; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            background: #33415566; 
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer; 
            transition: all 0.2s ease;
        }

        .customer-btn.active { 
            background: var(--accent); 
            border-color: var(--accent);
            color: #064e3b;
            transform: scale(0.98);
        }

        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            background: #0f172a;
            border: 1px solid var(--border); 
            border-radius: 12px; 
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .send-btn { 
            width: 100%; 
            padding: 18px; 
            background: var(--accent); 
            color: #064e3b; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 800; 
            cursor: pointer; 
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            transition: transform 0.1s;
        }

        .send-btn:active { transform: scale(0.96); }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="app-card">
    <h2>SabanOS Dispatch</h2>
    
    <span class="section-title">בחר לקוח:</span>
    <div class="grid" id="customerGrid">
        <button class="customer-btn" onclick="select('זבולון-עדירן', this)">זבולון-עדירן</button>
        <button class="customer-btn" onclick="select('ד.ניב', this)">ד.ניב</button>
        <button class="customer-btn" onclick="select('קבוצת הזמנות', this)">קבוצת הזמנות</button>
        <button class="customer-btn" onclick="select('אחר', this)">לקוח אחר</button>
    </div>

    <input type="text" id="customCustomer" placeholder="שם הלקוח..." style="display:none;">
    <input type="number" id="orderNum" placeholder="מספר הזמנה" inputmode="numeric">

    <button class="send-btn" onclick="share()">שגר לערוץ 🚀</button>
    
    <div class="footer">מערכת ניהול סידור עבודה חכמה</div>
</div>

<script>
    let selected = "";

    function select(name, btn) {
        selected = name;
        document.querySelectorAll('.customer-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('customCustomer').style.display = (name === 'אחר') ? 'block' : 'none';
    }

    function share() {
        const finalCustomer = selected === 'אחר' ? document.getElementById('customCustomer').value : selected;
        const orderId = document.getElementById('orderNum').value || "חדשה";
        
        if (!finalCustomer) return alert("אחי, בחר לקוח!");

        const msg = `*📦 הזמנה חדשה - סידור עבודה*\n` +
                    `---------------------------\n` +
                    `👤 *לקוח:* ${finalCustomer}\n` +
                    `🆔 *מספר:* #${orderId}\n` +
                    `⏳ *סטטוס:* ממתין לביצוע\n` +
                    `---------------------------\n` +
                    `_נשלח דרך SabanOS_`;

        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
</html>
