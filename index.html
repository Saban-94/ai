<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SabanOS - מרכז הזמנות וסידור</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #25D366; --secondary: #128C7E; --bg: #f0f2f5; --dark: #333; }
        body { font-family: 'Segoe UI', system-ui; background: var(--bg); margin: 0; padding: 15px; color: var(--dark); }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; color: var(--secondary); border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        button { padding: 12px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-select { background: white; }
        .btn-select.active { background: var(--primary); color: white; border-color: var(--primary); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-action { width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; font-size: 18px; margin-top: 10px; }
        .btn-morning { background: #3498db; } /* צבע שונה לדוח בוקר */
        .history-tag { font-size: 12px; color: #777; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚀 יצירת הזמנה חדשה</h2>
    <div class="grid" id="customerGrid">
        <button class="btn-select" onclick="setCustomer('זבולון-עדירן', this)">זבולון-עדירן</button>
        <button class="btn-select" onclick="setCustomer('ד.ניב', this)">ד.ניב</button>
        <button class="btn-select" onclick="setCustomer('קבוצת הזמנות', this)">קבוצת הזמנות</button>
        <button class="btn-select" onclick="setCustomer('אוניל מהלה', this)">אוניל מהלה</button>
    </div>
    <input type="text" id="orderNum" placeholder="מספר הזמנה (למשל: 62100614)">
    <select id="deliveryType">
        <option value="מנוף🏗️חכמת">🏗️ מנוף - חכמת</option>
        <option value="משאית🚛עלי">🚛 משאית - עלי</option>
    </select>
    <button class="btn-action" onclick="handleOrder()">שגר לערוץ + שמירה ⚡</button>
</div>

<div class="card">
    <h2>☀️ דוח בוקר מהיר</h2>
    <button class="btn-action btn-morning" onclick="sendMorningReport()">שגר דוח בוקר לצוות 📅</button>
    <p class="history-tag">סניף החרש (חכמת) | סניף התלמיד (עלי)</p>
</div>

<script>
    // הגדרות Supabase - תחליף ב-URL וה-Key שלך
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY = 'YOUR_SUPABASE_KEY';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let selectedCustomer = "";

    function setCustomer(name, btn) {
        selectedCustomer = name;
        document.querySelectorAll('.btn-select').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // פונקציה לשמירה ב-Supabase
    async function saveToDB(customer, orderId, type) {
        const { data, error } = await supabase
            .from('orders_history') // וודא שיש לך טבלה כזו
            .insert([{ customer_name: customer, order_id: orderId, delivery_type: type, created_at: new Date() }]);
        if (error) console.error('Error saving to DB:', error);
    }

    function handleOrder() {
        const orderId = document.getElementById('orderNum').value;
        const type = document.getElementById('deliveryType').value;

        if (!selectedCustomer || !orderId) {
            alert("אחי, תשלים שם לקוח ומספר הזמנה!");
            return;
        }

        // שמירה להיסטוריה ב-Supabase
        saveToDB(selectedCustomer, orderId, type);

        // יצירת תבנית ההודעה
        const msg = `*📦 הזמנה חדשה במערכת*\n---------------------------\n👤 *לקוח:* ${selectedCustomer}\n🆔 *מספר:* ${orderId}\n🚚 *הובלה:* ${type}\n⏳ *סטטוס:* בטיפול (טרם סופק)\n---------------------------\n_נשלח מלוח הבקרה SabanOS_`;
        
        shareToWhatsApp(msg);
    }

    function sendMorningReport() {
        const msg = `☀️ *דוח בוקר - סידור הובלות*\n---------------------------\n🏗️ *חכמת (מנוף):*\n📍 סניף החרש: העמסה 06:30 | התחייבות 07:00.\n\n🚛 *עלי (משאית):*\n📍 סניף התלמיד: העמסה 06:30 | יציאה 07:00.\n⬅️ קו: זבולון (כ"ס) | אוניל (רעננה) | ד.ניב (רמה"ש).\n---------------------------\n📅 *תאריך:* ${new Date().toLocaleDateString('he-IL')}\n_נא לאשר קבלת סידור_ ✅`;
        
        shareToWhatsApp(msg);
    }

    function shareToWhatsApp(text) {
        const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
